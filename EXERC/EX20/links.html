<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif
        }
        a{
            color: rgb(0, 255, 98);
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: brown;
        }
        a:hover{
            color: black;
            text-decoration: underline;
        }
        a:active{
            color: rgb(255, 174, 127);
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://apple.com" target="_blank">Apple</a></li>
        <li><a href="https://animes.online" target="_blank">Canal</a></li>
        <li><a href="https://cursoemvideo.co," target="_blank">Site</a></li>
    </ul>
</body>
</html>
